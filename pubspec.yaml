name: srivalli_jewellers
description: Srivalli Jewellers Management System - an offline, on-device gold & silver jewellery inventory app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local database (primary) + storage paths
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Flags / lightweight prefs
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.2.0

  # Formatting / i18n
  intl: ^0.19.0

  # Media
  image_picker: ^1.1.2

  # Fonts & charts
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0

  # Ids
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/categories/
